<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研修席シェア</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>研修席シェア</h1>
      <p class="subtitle">席を選択して、画像をSlackに貼り付けます。</p>
    </header>

    <section class="card">
      <fieldset class="segmented" aria-label="長机の数">
        <legend>長机の数</legend>
        <label>
          <input type="radio" name="deskCount" value="2">
          <span>2つ</span>
        </label>
        <label>
          <input type="radio" name="deskCount" value="3" checked>
          <span>3つ</span>
        </label>
      </fieldset>

      <div class="canvas-wrap">
        <canvas id="island-canvas"></canvas>
      </div>

      <div class="actions">
        <button id="copy-btn" type="button" disabled>画像をコピー</button>
      </div>
      <p class="copy-status" id="copy-status" aria-live="polite"></p>
    </section>
  </main>

  <script type="module" src="src/app.js"></script>
</body>
</html>
